<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book a Slot 🔥 — Forged in Fire</title>

  <!-- Open Graph / Slack preview -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Book a Slot 🔥 — Forged in Fire" />
  <meta property="og:description" content="30 min · Present a demo & get feedback with a HappyRobot co-founder." />
  <meta property="og:image" content="https://e01-phantom-expansion.uecdn.es/216a1cde343471623850cb23ab40d98e/crop/175x33/1813x1126/resize/1200/f/webp/assets/multimedia/imagenes/2024/12/05/17333953634925.jpg" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* Fade-in */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .page {
      width: 100%;
      max-width: 460px;
      animation: fadeIn 0.5s ease both;
    }

    /* Logo */
    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 28px;
    }

    .logo-wrap img {
      height: 22px;
      filter: brightness(0) invert(1);
      opacity: 0.9;
    }

    /* Founders photo */
    .founders-photo {
      width: 100%;
      height: 130px;
      object-fit: cover;
      object-position: center 20%;
      border-radius: 12px;
      display: block;
      margin-bottom: 28px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    /* Header text */
    .header {
      margin-bottom: 24px;
    }

    .label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 8px;
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.45);
    }

    /* Divider */
    .divider {
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin-bottom: 20px;
    }

    /* Cards */
    .cards {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 10px;
      background: #111;
      border: 1px solid rgba(255, 255, 255, 0.08);
      text-decoration: none;
      color: #fff;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
    }

    .card:hover {
      background: #1a1a1a;
      border-color: rgba(255,255,255,0.16);
      transform: scale(1.015);
    }

    .card.disabled {
      cursor: default;
      opacity: 0.5;
    }

    .card.disabled:hover {
      background: #111;
      border-color: rgba(255, 255, 255, 0.08);
      transform: none;
    }

    /* Avatar */
    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      flex-shrink: 0;
      color: #fff;
    }

    .avatar-pablo { background: linear-gradient(135deg, #c0392b, #e74c3c); }
    .avatar-javi  { background: linear-gradient(135deg, #1a6fa8, #2980b9); }
    .avatar-luis  { background: linear-gradient(135deg, #1e8449, #27ae60); }

    .card-info {
      flex: 1;
      min-width: 0;
    }

    .card-name {
      font-size: 15px;
      font-weight: 600;
    }

    .card-role {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 2px;
    }

    .arrow {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.25);
      flex-shrink: 0;
    }

    /* Coming soon badge */
    .badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 3px 9px;
      color: rgba(255, 255, 255, 0.35);
      flex-shrink: 0;
    }

    /* Footer */
    footer {
      margin-top: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.2);
    }

    footer img {
      height: 14px;
      filter: brightness(0) invert(1);
      opacity: 0.25;
    }

    @media (max-width: 480px) {
      body { padding: 28px 16px; }
      h1   { font-size: 22px; }
      .founders-photo { height: 100px; }
    }
  </style>
</head>
<body>

  <div class="page">

    <!-- HappyRobot logo -->
    <div class="logo-wrap">
      <img
        src="https://s3-us-west-2.amazonaws.com/cbi-image-service-prd/original/ddc194f4-de55-49cf-bfd9-de92649773de.png"
        alt="HappyRobot"
        onerror="this.style.display='none';"
      />
    </div>

    <!-- Founders photo (small, at top) -->
    <img
      class="founders-photo"
      src="https://e01-phantom-expansion.uecdn.es/216a1cde343471623850cb23ab40d98e/crop/175x33/1813x1126/resize/1200/f/webp/assets/multimedia/imagenes/2024/12/05/17333953634925.jpg"
      alt="Founders"
    />

    <!-- Header -->
    <div class="header">
      <p class="label">Forged in Fire</p>
      <h1>Book a Slot 🔥</h1>
      <p class="subtitle">30 min · Present a demo &amp; get feedback</p>
    </div>

    <div class="divider"></div>

    <!-- Cards -->
    <div class="cards">

      <a class="card" href="https://calendar.app.google/bgnXK2Xvd51op87eA" target="_blank" rel="noopener">
        <div class="avatar avatar-pablo">P</div>
        <div class="card-info">
          <div class="card-name">Pablo</div>
          <div class="card-role">Co-founder</div>
        </div>
        <span class="arrow">→</span>
      </a>

      <a class="card" href="https://calendar.app.google/jxmPh9TQoYHhZYEa8" target="_blank" rel="noopener">
        <div class="avatar avatar-javi">J</div>
        <div class="card-info">
          <div class="card-name">Javi</div>
          <div class="card-role">Co-founder</div>
        </div>
        <span class="arrow">→</span>
      </a>

      <div class="card disabled">
        <div class="avatar avatar-luis">L</div>
        <div class="card-info">
          <div class="card-name">Luis</div>
          <div class="card-role">Co-founder</div>
        </div>
        <span class="badge">Coming soon</span>
      </div>

    </div>

    <footer>
      <span>Powered by</span>
      <img
        src="https://s3-us-west-2.amazonaws.com/cbi-image-service-prd/original/ddc194f4-de55-49cf-bfd9-de92649773de.png"
        alt="HappyRobot"
        onerror="this.style.display='none';"
      />
      <span>HappyRobot</span>
    </footer>

  </div>

</body>
</html>
